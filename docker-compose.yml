version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: codeshift-postgres
    environment:
      POSTGRES_USER: codeshift
      POSTGRES_PASSWORD: codeshift_dev_password
      POSTGRES_DB: codeshift_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeshift"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeshift-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: codeshift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeshift-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: codeshift-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: qdrant_api_key_dev
    networks:
      - codeshift-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeshift-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://codeshift:codeshift_dev_password@postgres:5432/codeshift_ai
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=qdrant_api_key_dev
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=your-super-secret-jwt-key-change-in-prod
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - codeshift-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: codeshift-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_ENVIRONMENT=development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - codeshift-network
    command: npm run dev

networks:
  codeshift-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
